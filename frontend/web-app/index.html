<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대시보드 — MSA Template</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">MSA Template</span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white" id="nav-username"></span>
      <a href="todo.html" class="btn btn-sm btn-outline-light">할 일 관리</a>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h5 class="mb-3">내 정보</h5>
    <div id="user-info" class="card p-3" style="max-width:480px">
      <div class="text-muted">로딩 중...</div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    (async () => {
      await requireAuth();

      const cached = getCurrentUser();
      if (cached) renderUser(cached);

      const userId = JSON.parse(atob(getAccessToken().split('.')[1])).sub;
      const res = await fetchWithAuth(`${GATEWAY}/api/v1/users/${userId}`);
      if (!res || !res.ok) return;
      const body = await res.json();
      const user = body.data;
      setCurrentUser(user);
      renderUser(user);
    })();

    function renderUser(user) {
      document.getElementById('nav-username').textContent = user.username;
      document.getElementById('user-info').innerHTML = `
        <table class="table table-sm mb-0">
          <tr><th>ID</th><td>${user.id}</td></tr>
          <tr><th>사용자명</th><td>${user.username}</td></tr>
          <tr><th>이메일</th><td>${user.email}</td></tr>
          <tr><th>역할</th><td><span class="badge bg-${user.role === 'ROLE_ADMIN' ? 'danger' : 'secondary'}">${user.role}</span></td></tr>
        </table>
      `;
    }
  </script>
</body>
</html>
