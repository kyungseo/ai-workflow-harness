<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>할 일 관리 — MSA Template</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">MSA Template</span>
    <div class="d-flex align-items-center gap-3">
      <a href="index.html" class="btn btn-sm btn-outline-light">내 정보</a>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:720px">
    <h5 class="mb-3">할 일 관리</h5>

    <div id="error-msg" class="alert alert-danger d-none mb-3"></div>

    <div class="card mb-4">
      <div class="card-body">
        <div class="mb-2">
          <input type="text" id="todo-title" class="form-control" placeholder="제목 (필수)">
        </div>
        <div class="mb-2">
          <input type="text" id="todo-desc" class="form-control" placeholder="설명 (선택)">
        </div>
        <button class="btn btn-primary" onclick="createTodo()">추가</button>
      </div>
    </div>

    <ul id="todo-list" class="list-group mb-3"></ul>
    <div id="pagination" class="d-flex justify-content-center"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/todo.js"></script>
  <script>
    (async () => {
      await requireAuth();
      await loadTodos(0);

      document.getElementById('todo-title').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') createTodo();
      });
    })();
  </script>
</body>
</html>
