name: CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'prompts/**'
      - '.claude/**'
      - '.cursor/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'prompts/**'
      - '.claude/**'
      - '.cursor/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'

jobs:
  validate:
    name: Docs and Scaffold Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n scripts/create-harness.sh

      - name: Validate generic scaffold dry-run
        run: ./scripts/create-harness.sh --dry-run --profile generic ci-harness-check /tmp/ci-harness-check

      - name: Check for stale runtime identity in live core docs
        run: |
          ! grep -RInE 'Spring Boot 3\.5|io\.kyungseo\.msa|Gradle wrapper' \
            AGENTS.md CLAUDE.md \
            docs/AGENT-WORKFLOW.md docs/HARNESS-PROTOCOL.md docs/HARNESS-QUICK-REFERENCE.md \
            docs/PLAN.md docs/PLAN-SUMMARY.md docs/STATUS.md \
            docs/WORKFLOW-MANUAL.md docs/WORKFLOW-MANUAL-SUMMARY.md docs/WORKFLOW-MANUAL-SUMMARY-PUBLIC.md \
            prompts || {
              echo "Stale runtime identity found in live core docs."
              exit 1
            }
