spring:
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 5000
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

jwt:
  secret: "test-secret-key-for-integration-test-must-be-at-least-256-bits-long!!"

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    io.kyungseo: DEBUG
