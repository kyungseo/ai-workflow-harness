spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/msa_db
    username: msa_user
    password: msa_pass
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 5000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    io.kyungseo: DEBUG
