server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/v1/users/**
        - id: todo-service
          uri: ${TODO_SERVICE_URL:http://localhost:8093}
          predicates:
            - Path=/api/v1/todos/**

jwt:
  secret: ${JWT_SECRET}

gateway:
  blacklist-fail-policy: ${BLACKLIST_FAIL_POLICY:fail-close}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

management:
  server:
    port: 8099
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
